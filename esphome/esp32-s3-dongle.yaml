substitutions:
  name: esp32-s3-dongle
  friendly_name: ESP32 S3 Dongle

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} Fallback
    password: !secret fallback_ap_password

captive_portal:

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory Reset
  - platform: restart
    name: Restart

output:
  - platform: gpio
    pin: GPIO1
    id: blue_led_output

light:
  - platform: binary
    name: Blue LED
    output: blue_led_output
